const T = {
  bg: "#0a0a0f", surface: "#12121a", surfaceHover: "#1a1a25", border: "#1e1e2e",

  accent: "#6366f1", accentSoft: "rgba(99,102,241,0.12)", accentGlow: "rgba(99,102,241,0.25)",
  success: "#22c55e", warning: "#f59e0b",
};

function App() {
  const [activeSection, setActiveSection] = useState("identity");
  const [formData, setFormData] = useState({});
  const [showExport, setShowExport] = useState(false);
  const [copied, setCopied] = useState(false);
  const [exportFormat, setExportFormat] = useState("json");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const handleChange = useCallback((key, value) => {
    setFormData(prev => ({ ...prev, [key]: value }));
  }, []);

  const filledCount = Object.values(formData).filter(v => v !== "" && v !== undefined && v !== null).length;
  const totalFields = SECTIONS.reduce((sum, s) => sum + s.fields.length, 0);
  const pct = Math.round((filledCount / totalFields) * 100);

  const sectionFilledCount = (sid) => {
    const sec = SECTIONS.find(s => s.id === sid);
    return sec.fields.filter(f => formData[f.key] && formData[f.key] !== "").length;
  };

  const buildExport = () => {
    const structured = {
      _meta: {
        version: "1.0",
        generated: new Date().toISOString(),
        format: "agent-persona-profile",
        description: "Structured personal profile for AI agent consumption. Parse this to understand the user deeply."
      }
    };
    const arrayHints = ["skill","hobbies","cuisines","types","genres","communities","languages","tools","artists","foods","destinations","accounts","insurance","allergies","medications","conditions"];
    SECTIONS.forEach(section => {
      structured[section.id] = {};
      section.fields.forEach(field => {
        const val = formData[field.key];
        if (val !== undefined && val !== "" && val !== null) {
          if (field.type === "number") {
            structured[section.id][field.key] = Number(val);
          } else if (typeof val === "string" && val.includes(",") && arrayHints.some(h => field.key.includes(h))) {
            structured[section.id][field.key] = val.split(",").map(s => s.trim()).filter(Boolean);
          } else {
            structured[section.id][field.key] = val;
          }
        }
      });
      if (Object.keys(structured[section.id]).length === 0) delete structured[section.id];
    });
    return structured;
  };

  const toYaml = (obj, indent) => {
    indent = indent || 0;
    let out = "";
    const pad = "  ".repeat(indent);
    for (const k of Object.keys(obj)) {
      const v = obj[k];
      if (v && typeof v === "object" && !Array.isArray(v)) {
        out += pad + k + ":\n" + toYaml(v, indent + 1);
      } else if (Array.isArray(v)) {
        out += pad + k + ":\n";
        v.forEach(item => { out += pad + "  - " + item + "\n"; });
      } else {
        const val = typeof v === "string" && (v.includes(":") || v.includes("#") || v.includes("'")) ? '"' + v + '"' : v;
        out += pad + k + ": " + val + "\n";
      }
    }
    return out;
  };

  const getExportString = () => {
    const data = buildExport();
    return exportFormat === "json" ? JSON.stringify(data, null, 2) : toYaml(data);
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(getExportString());
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const handleDownload = () => {
    const ext = exportFormat === "json" ? "json" : "yaml";
    const mime = exportFormat === "json" ? "application/json" : "text/yaml";
    const blob = new Blob([getExportString()], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "my-persona." + ext; a.click();
    URL.revokeObjectURL(url);
  };

  const currentSection = SECTIONS.find(s => s.id === activeSection);

  const navTo = (id) => { setActiveSection(id); setShowExport(false); setSidebarOpen(false); };

  return React.createElement("div", { style: { minHeight: "100vh", background: T.bg, color: T.text, fontFamily: "'DM Sans', 'Segoe UI', system-ui, sans-serif", display: "flex", flexDirection: "column" } },

    // Header
    React.createElement("div", { style: { padding: "20px 24px 16px", borderBottom: "1px solid " + T.border, flexShrink: 0 } },
      React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 } },
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
          React.createElement("button", {
            onClick: () => setSidebarOpen(!sidebarOpen),
            style: { display: "none", background: "none", border: "1px solid " + T.border, borderRadius: 6, color: T.textMuted, padding: "6px 10px", cursor: "pointer", fontSize: 16, lineHeight: 1 },
            className: "mobile-menu"
          }, "\u2630"),
          React.createElement("div", null,
            React.createElement("h1", { style: { margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: "-0.02em", display: "flex", alignItems: "center", gap: 8 } },
              React.createElement("span", { style: { color: T.accent, fontFamily: "'Space Mono', monospace", fontSize: 16 } }, "{}"),
              "persona.json"
            ),
            React.createElement("p", { style: { margin: "2px 0 0", fontSize: 12, color: T.textMuted } }, "Fill what you want, skip what you don\u2019t \u2014 export for your agents")
          )
